<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="shell">

    <aside class="sidebar">
      <a href="{{ '/' | relative_url }}" class="profile-link">
        <img class="profile-photo" src="{{ site.profile_image | relative_url }}" alt="{{ site.nickname }}">
      </a>
      <p class="nickname">{{ site.nickname }}</p>
      <a class="about-btn" href="{{ '/about/' | relative_url }}">About me</a>
    </aside>

    <main class="content">
      {{ content }}
    </main>

  </div>

  <script>
  /* Manual page transition: fade the content out on an internal-link
     click, then navigate; the new page fades its content in on load.
     The sidebar is never touched, so the profile doesn't flicker. */
  (function () {
    var c = document.querySelector('.content');
    if (!c) return;
    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Restore from the back/forward cache cleanly: drop any leftover
    // exit state and replay the enter animation.
    window.addEventListener('pageshow', function (e) {
      c.classList.remove('is-leaving');
      if (e.persisted && !reduce) {
        c.style.animation = 'none';
        void c.offsetWidth;
        c.style.animation = '';
      }
    });

    if (reduce) return;

    function internal(a) {
      if (!a || a.target === '_blank' || a.hasAttribute('download')) return false;
      var href = a.getAttribute('href');
      if (!href || href.charAt(0) === '#') return false;
      if (/^(mailto:|tel:|javascript:)/i.test(href)) return false;
      try { if (new URL(a.href).origin !== location.origin) return false; }
      catch (e) { return false; }
      return true;
    }

    document.addEventListener('click', function (e) {
      if (e.defaultPrevented || e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      var a = e.target.closest ? e.target.closest('a') : null;
      if (!internal(a)) return;
      e.preventDefault();
      var href = a.href, done = false;
      function go() { if (!done) { done = true; window.location.href = href; } }
      c.addEventListener('animationend', go, { once: true });
      setTimeout(go, 320);
      c.classList.add('is-leaving');
    });
  })();
  </script>
</body>
</html>
