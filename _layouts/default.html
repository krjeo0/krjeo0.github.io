<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="shell">

    <aside class="sidebar">
      <a href="{{ '/' | relative_url }}" class="profile-link">
        <img class="profile-photo" src="{{ site.profile_image | relative_url }}" alt="{{ site.nickname }}">
      </a>
      <p class="nickname">{{ site.nickname }}</p>
      <a class="about-btn" href="{{ '/about/' | relative_url }}">About me</a>
    </aside>

    <main class="content">
      {{ content }}
    </main>

  </div>

  <script>
  /* Cross-document transition: morph the clicked paper title into the
     summary-page heading (and back). Safe no-op where unsupported. */
  (function () {
    function rowByUrl(url) {
      var p;
      try { p = new URL(url, location.href).pathname; } catch (e) { return null; }
      var links = document.querySelectorAll('.paper-db a[href]');
      for (var i = 0; i < links.length; i++) {
        try { if (new URL(links[i].href).pathname === p) return links[i]; } catch (e) {}
      }
      return null;
    }
    window.addEventListener('pageswap', function (e) {
      if (!e.viewTransition) return;
      var dest = e.activation && e.activation.entry && e.activation.entry.url;
      var a = dest && rowByUrl(dest);
      if (a) a.style.viewTransitionName = 'paper-title';
    });
    window.addEventListener('pagereveal', function (e) {
      if (!e.viewTransition) return;
      if (typeof navigation === 'undefined' || !navigation.activation || !navigation.activation.from) return;
      var a = rowByUrl(navigation.activation.from.url);
      if (a) a.style.viewTransitionName = 'paper-title';
    });
  })();
  </script>
</body>
</html>
